name: build

on:
  push:
    branches: [main, ci-gha]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.get-versions.outputs.versions }}
    steps:
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          ignore-empty-workdir: true
          enable-cache: false

      - name: Discover available IDA versions
        id: get-versions
        env:
          HCLI_API_KEY: ${{ secrets.HCLI_API_KEY }}
        shell: bash
        run: |
          # List all available tags and extract unique IDA 9.x+ version numbers,
          # excluding "latest", service packs (sp), and test builds.
          versions=$(uvx --from ida-hcli hcli --disable-updates download --list-tags 2>/dev/null \
            | grep -oP 'ida-pro:\K[0-9]+\.[0-9]+(?=:)' \
            | sort -Vu \
            | awk -F. '$1 >= 9' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "versions=$versions" >> "$GITHUB_OUTPUT"
          echo "Discovered IDA versions: $versions"

  build:
    needs: discover
    permissions:
      contents: write
    name: IDA ${{ matrix.ida_version }} on ${{ matrix.os_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        ida_version: ${{ fromJson(needs.discover.outputs.versions) }}
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        include:
          - os: ubuntu-latest
            os_name: "linux"
          - os: windows-latest
            os_name: "windows"
          - os: macos-latest
            os_name: "macos"

    steps:
      - name: Setup MSBuild
        if: matrix.os_name == 'windows'
        uses: microsoft/setup-msbuild@v1.1

      - name: Setup Visual Studio 2022
        if: matrix.os_name == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          vsversion: 2022

      - name: Setup uv
        # on act, need use v5 instead of v6, due to:
        # https://github.com/astral-sh/setup-uv/issues/535
        # (ultimately an issue with act images)
        uses: astral-sh/setup-uv@v5

      - name: Checkout BinExport
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: "recursive"

      - name: Download IDA SDK ${{ matrix.ida_version }}
        shell: bash
        env:
          HCLI_API_KEY: ${{ secrets.HCLI_API_KEY }}
        run: |
          SDK_COMPACT=$(echo "${{ matrix.ida_version }}" | tr -d '.')
          SDK_SLUG="release/${{ matrix.ida_version }}/sdk-and-utilities/idasdk${SDK_COMPACT}.zip"
          echo "Downloading SDK: $SDK_SLUG"

          uvx --from ida-hcli hcli --disable-updates download "$SDK_SLUG"
          unzip idasdk*.zip -d ./ida-temp/

          SDK_ROOT=$(dirname "$(find ./ida-temp/ -maxdepth 3 -name allmake.mak | head -1)")
          mv "$SDK_ROOT" ./ida-sdk

      # There's a bug in BinExport's IDA 9+ support on macOS
      # reported here: https://github.com/google/binexport/issues/159
      - name: Patch BinExport for IDA SDK 9.x on macOS
        if: matrix.os_name == 'macos'
        shell: bash
        run: |
          git apply --verbose .github/patches/binexport-bdb8c4430549e69d4a9a7531c59b197f3a0757e6.patch

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install Ninja
        run: uv tool install ninja

      - name: Configure BinExport build
        shell: bash
        run: |
          # Build universal binaries on macOS (both arm64 and x86_64)
          if [ "${{ matrix.os_name }}" = "macos" ]; then
            CMAKE_EXTRA_FLAGS="-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64"
          else
            CMAKE_EXTRA_FLAGS=""
          fi

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=install \
            -DBINEXPORT_ENABLE_IDAPRO=ON \
            -DBINEXPORT_ENABLE_BINARYNINJA=OFF \
            "-DIdaSdk_ROOT_DIR=$PWD/ida-sdk" \
            $CMAKE_EXTRA_FLAGS

      - name: Build BinExport
        shell: bash
        run: |
          cmake --build build --config Release --parallel 4

      - name: Run tests
        shell: bash
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Install BinExport
        shell: bash
        run: cmake --install build --config Release

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          cp -v install/binexport-prefix/* artifacts/
          jq '.plugin.idaVersions = "==${{ matrix.ida_version }}"' ida/ida-plugin.json > artifacts/ida-plugin.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binexport-ida${{ matrix.ida_version }}-${{ matrix.os_name }}
          path: artifacts/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [discover, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create per-version archives
        shell: bash
        run: |
          versions='${{ needs.discover.outputs.versions }}'
          for version in $(echo "$versions" | jq -r '.[]'); do
            echo "Creating archive for IDA $version..."
            mkdir -p "stage-${version}"

            # Merge artifacts from all OSes for this version
            for dir in artifacts/binexport-ida${version}-*/; do
              [ -d "$dir" ] && cp -v "$dir"/* "stage-${version}/"
            done

            # Remove non-plugin files
            rm -f "stage-${version}"/binexport2dump*
            rm -f "stage-${version}"/bxp*

            cd "stage-${version}"
            zip -r "../binexport-ida${version}.zip" *
            cd ..
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: binexport-ida*.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
